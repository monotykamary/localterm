<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Diff animation edge cases preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @keyframes diff-line-added {
        0% {
          grid-template-rows: 0fr;
          opacity: 0;
        }
        100% {
          grid-template-rows: 1fr;
          opacity: 1;
        }
      }
      @keyframes diff-line-removed {
        0% {
          grid-template-rows: 1fr;
          opacity: 1;
        }
        100% {
          grid-template-rows: 0fr;
          opacity: 0;
        }
      }
      .animate-diff-line-added {
        display: grid;
        animation-name: diff-line-added;
        animation-duration: 250ms;
        animation-timing-function: cubic-bezier(0.7, 0, 1, 1);
        animation-fill-mode: both;
      }
      .animate-diff-line-removed {
        display: grid;
        animation-name: diff-line-removed;
        animation-duration: 250ms;
        animation-timing-function: cubic-bezier(0, 0, 0.4, 1);
        animation-fill-mode: both;
      }
      .delay-add {
        animation-delay: 250ms;
      }
    </style>
  </head>
  <body class="min-h-screen bg-neutral-950 p-6 font-mono text-sm text-neutral-100">
    <div class="mx-auto max-w-5xl space-y-6">
      <div class="flex items-center justify-between">
        <h1 class="font-sans text-lg font-medium">Diff animation edge cases</h1>
        <button
          id="replay-all"
          class="rounded border border-neutral-700 px-3 py-1 font-sans text-xs hover:bg-neutral-800"
        >
          Replay all
        </button>
      </div>

      <div id="stage" class="grid gap-4 md:grid-cols-2"></div>
    </div>

    <script>
      const lineNumberCell = (text) =>
        `<span class="w-12 shrink-0 select-none px-2 text-right text-neutral-500">${text}</span>`;

      const renderLine = (row, oldLine, newLine) => {
        const sign = row.kind === "add" ? "+" : row.kind === "remove" ? "-" : "";
        const colorClass =
          row.kind === "add"
            ? "text-emerald-400 bg-emerald-500/10"
            : row.kind === "remove"
              ? "text-red-400 bg-red-500/10"
              : "text-neutral-400";
        return `
          <div class="flex ${colorClass}">
            ${lineNumberCell(oldLine)}${lineNumberCell(newLine)}
            <span class="w-5 shrink-0 select-none text-center">${sign}</span>
            <span class="min-w-0 flex-1 whitespace-pre">${row.text}</span>
          </div>
        `;
      };

      const groupForRow = (row) => (row.kind === "context" ? "context" : row.kind);

      const renderFrame = (rows, animate) => {
        let oldLine = 1;
        let newLine = 1;
        const numberedRows = rows.map((row) => {
          if (row.kind === "context") {
            return {
              ...row,
              oldLine: oldLine++,
              newLine: newLine++,
            };
          }
          if (row.kind === "remove") {
            return { ...row, oldLine: oldLine++, newLine: "" };
          }
          return { ...row, oldLine: "", newLine: newLine++ };
        });

        const hasRemove = numberedRows.some((row) => row.kind === "remove");
        const groups = [];
        let current = null;
        for (const row of numberedRows) {
          const group = groupForRow(row);
          if (!current || current.group !== group) {
            if (current) groups.push(current);
            current = { group, rows: [row] };
          } else {
            current.rows.push(row);
          }
        }
        if (current) groups.push(current);

        let html = "";
        for (const group of groups) {
          const content = group.rows
            .map((row) => renderLine(row, row.oldLine, row.newLine))
            .join("");
          if (group.group === "context") {
            html += content;
            continue;
          }
          if (!animate) {
            html += content;
            continue;
          }
          const animationClass =
            group.group === "add" ? "animate-diff-line-added" : "animate-diff-line-removed";
          const delayed = group.group === "add" && hasRemove ? "delay-add" : "";
          html += `
            <div class="${animationClass} ${delayed}">
              <div class="min-h-0 overflow-hidden">${content}</div>
            </div>
          `;
        }

        return html;
      };

      const examples = [
        {
          title: "Add then remove",
          frames: [
            [
              { kind: "context", text: "function main() {" },
              { kind: "context", text: "}" },
            ],
            [
              { kind: "context", text: "function main() {" },
              { kind: "add", text: "  console.log('hello');" },
              { kind: "context", text: "}" },
            ],
            [
              { kind: "context", text: "function main() {" },
              { kind: "remove", text: "  console.log('hello');" },
              { kind: "context", text: "}" },
            ],
          ],
        },
        {
          title: "Remove then add back",
          frames: [
            [
              { kind: "context", text: "function main() {" },
              { kind: "context", text: "  init();" },
              { kind: "context", text: "}" },
            ],
            [
              { kind: "context", text: "function main() {" },
              { kind: "remove", text: "  init();" },
              { kind: "context", text: "}" },
            ],
            [
              { kind: "context", text: "function main() {" },
              { kind: "add", text: "  init();" },
              { kind: "context", text: "}" },
            ],
          ],
        },
        {
          title: "Modify then revert",
          frames: [
            [
              { kind: "context", text: "function main() {" },
              { kind: "context", text: "  const name = 'old';" },
              { kind: "context", text: "}" },
            ],
            [
              { kind: "context", text: "function main() {" },
              { kind: "remove", text: "  const name = 'old';" },
              { kind: "add", text: "  const name = 'new';" },
              { kind: "context", text: "}" },
            ],
            [
              { kind: "context", text: "function main() {" },
              { kind: "remove", text: "  const name = 'new';" },
              { kind: "add", text: "  const name = 'old';" },
              { kind: "context", text: "}" },
            ],
          ],
        },
        {
          title: "Interleaved swap",
          frames: [
            [
              { kind: "context", text: "function main() {" },
              { kind: "context", text: "  a();" },
              { kind: "context", text: "  b();" },
              { kind: "context", text: "}" },
            ],
            [
              { kind: "context", text: "function main() {" },
              { kind: "remove", text: "  a();" },
              { kind: "add", text: "  x();" },
              { kind: "remove", text: "  b();" },
              { kind: "add", text: "  y();" },
              { kind: "context", text: "}" },
            ],
            [
              { kind: "context", text: "function main() {" },
              { kind: "remove", text: "  x();" },
              { kind: "add", text: "  a();" },
              { kind: "remove", text: "  y();" },
              { kind: "add", text: "  b();" },
              { kind: "context", text: "}" },
            ],
          ],
        },
        {
          title: "Add block then trim",
          frames: [
            [
              { kind: "context", text: "function main() {" },
              { kind: "context", text: "}" },
            ],
            [
              { kind: "context", text: "function main() {" },
              { kind: "add", text: "  one();" },
              { kind: "add", text: "  two();" },
              { kind: "add", text: "  three();" },
              { kind: "context", text: "}" },
            ],
            [
              { kind: "context", text: "function main() {" },
              { kind: "remove", text: "  one();" },
              { kind: "context", text: "  two();" },
              { kind: "remove", text: "  three();" },
              { kind: "context", text: "}" },
            ],
          ],
        },
        {
          title: "Remove block then restore partial",
          frames: [
            [
              { kind: "context", text: "function main() {" },
              { kind: "context", text: "  one();" },
              { kind: "context", text: "  two();" },
              { kind: "context", text: "  three();" },
              { kind: "context", text: "}" },
            ],
            [
              { kind: "context", text: "function main() {" },
              { kind: "remove", text: "  one();" },
              { kind: "remove", text: "  two();" },
              { kind: "remove", text: "  three();" },
              { kind: "context", text: "}" },
            ],
            [
              { kind: "context", text: "function main() {" },
              { kind: "add", text: "  one();" },
              { kind: "context", text: "  two();" },
              { kind: "add", text: "  three();" },
              { kind: "context", text: "}" },
            ],
          ],
        },
        {
          title: "Rapid add / remove same line",
          frames: [
            [
              { kind: "context", text: "function main() {" },
              { kind: "context", text: "}" },
            ],
            [
              { kind: "context", text: "function main() {" },
              { kind: "add", text: "  tick();" },
              { kind: "context", text: "}" },
            ],
            [
              { kind: "context", text: "function main() {" },
              { kind: "remove", text: "  tick();" },
              { kind: "context", text: "}" },
            ],
            [
              { kind: "context", text: "function main() {" },
              { kind: "add", text: "  tick();" },
              { kind: "context", text: "}" },
            ],
            [
              { kind: "context", text: "function main() {" },
              { kind: "remove", text: "  tick();" },
              { kind: "context", text: "}" },
            ],
          ],
        },
        {
          title: "Empty to full to empty",
          frames: [
            [],
            [
              { kind: "add", text: "function header() {" },
              { kind: "add", text: "  body();" },
              { kind: "add", text: "}" },
            ],
            [
              { kind: "remove", text: "function header() {" },
              { kind: "remove", text: "  body();" },
              { kind: "remove", text: "}" },
            ],
          ],
        },
        {
          title: "Whitespace / empty lines",
          frames: [
            [
              { kind: "context", text: "function main() {" },
              { kind: "context", text: "  run();" },
              { kind: "context", text: "}" },
            ],
            [
              { kind: "context", text: "function main() {" },
              { kind: "add", text: "  " },
              { kind: "add", text: "\t" },
              { kind: "context", text: "  run();" },
              { kind: "context", text: "}" },
            ],
            [
              { kind: "context", text: "function main() {" },
              { kind: "remove", text: "  " },
              { kind: "add", text: "  // not empty anymore" },
              { kind: "context", text: "  run();" },
              { kind: "context", text: "}" },
            ],
          ],
        },
        {
          title: "Long line wrap",
          frames: [
            [
              { kind: "context", text: "function main() {" },
              { kind: "context", text: "  short();" },
              { kind: "context", text: "}" },
            ],
            [
              { kind: "context", text: "function main() {" },
              {
                kind: "add",
                text: "  const veryLongVariableNameThatKeepsGoingAndGoingAndGoingAndGoingAndGoingAndGoingAndGoingAndGoingAndGoingAndGoingAndGoingAndGoingAndGoingAndGoingAndGoingAndGoingAndGoingAndGoingAndGoingAndGoing();",
              },
              { kind: "context", text: "  short();" },
              { kind: "context", text: "}" },
            ],
            [
              { kind: "context", text: "function main() {" },
              {
                kind: "remove",
                text: "  const veryLongVariableNameThatKeepsGoingAndGoingAndGoingAndGoingAndGoingAndGoingAndGoingAndGoingAndGoingAndGoingAndGoingAndGoingAndGoingAndGoingAndGoingAndGoingAndGoingAndGoingAndGoingAndGoing();",
              },
              { kind: "context", text: "  short();" },
              { kind: "context", text: "}" },
            ],
          ],
        },
        {
          title: "Move within context",
          frames: [
            [
              { kind: "context", text: "function main() {" },
              { kind: "context", text: "  before();" },
              { kind: "context", text: "  mover();" },
              { kind: "context", text: "  after();" },
              { kind: "context", text: "}" },
            ],
            [
              { kind: "context", text: "function main() {" },
              { kind: "context", text: "  before();" },
              { kind: "remove", text: "  mover();" },
              { kind: "add", text: "  mover();" },
              { kind: "context", text: "  after();" },
              { kind: "context", text: "}" },
            ],
            [
              { kind: "context", text: "function main() {" },
              { kind: "context", text: "  before();" },
              { kind: "context", text: "  after();" },
              { kind: "remove", text: "  mover();" },
              { kind: "add", text: "  mover();" },
              { kind: "context", text: "}" },
            ],
          ],
        },
        {
          title: "Replace block with different size",
          frames: [
            [
              { kind: "context", text: "function main() {" },
              { kind: "context", text: "  old1();" },
              { kind: "context", text: "  old2();" },
              { kind: "context", text: "}" },
            ],
            [
              { kind: "context", text: "function main() {" },
              { kind: "remove", text: "  old1();" },
              { kind: "remove", text: "  old2();" },
              { kind: "add", text: "  newA();" },
              { kind: "add", text: "  newB();" },
              { kind: "add", text: "  newC();" },
              { kind: "context", text: "}" },
            ],
            [
              { kind: "context", text: "function main() {" },
              { kind: "remove", text: "  newA();" },
              { kind: "remove", text: "  newB();" },
              { kind: "remove", text: "  newC();" },
              { kind: "add", text: "  old1();" },
              { kind: "add", text: "  old2();" },
              { kind: "context", text: "}" },
            ],
          ],
        },
      ];

      const stage = document.getElementById("stage");
      const timeouts = new Map();

      const buildCard = (example, index) => {
        const card = document.createElement("div");
        card.className = "rounded border border-neutral-800 bg-neutral-900 p-3";

        const header = document.createElement("div");
        header.className = "mb-2 flex items-center justify-between";

        const title = document.createElement("h2");
        title.className = "font-sans text-sm text-neutral-300";
        title.textContent = example.title;

        const label = document.createElement("span");
        label.className = "font-sans text-xs text-neutral-500";
        label.textContent = "frame 1";

        const replay = document.createElement("button");
        replay.className =
          "rounded border border-neutral-700 px-2 py-0.5 font-sans text-xs hover:bg-neutral-800";
        replay.textContent = "Replay";

        header.appendChild(title);
        header.appendChild(replay);

        const view = document.createElement("div");
        view.className = "rounded border border-neutral-800";

        const footer = document.createElement("div");
        footer.className = "mt-2 flex justify-end";
        footer.appendChild(label);

        card.appendChild(header);
        card.appendChild(view);
        card.appendChild(footer);

        const play = () => {
          for (const timeout of timeouts.get(index) ?? []) window.clearTimeout(timeout);
          const timers = [];
          view.innerHTML = renderFrame(example.frames[0], false);
          label.textContent = `frame 1 / ${example.frames.length}`;

          let elapsed = 800;
          for (let frameIndex = 1; frameIndex < example.frames.length; frameIndex += 1) {
            const timer = window.setTimeout(() => {
              view.innerHTML = renderFrame(example.frames[frameIndex], true);
              label.textContent = `frame ${frameIndex + 1} / ${example.frames.length}`;
            }, elapsed);
            timers.push(timer);
            const hasRemove = example.frames[frameIndex].some((row) => row.kind === "remove");
            elapsed += hasRemove ? 900 : 700;
          }

          const reset = window.setTimeout(() => {
            view.innerHTML = renderFrame(example.frames[0], false);
            label.textContent = `frame 1 / ${example.frames.length}`;
          }, elapsed + 400);
          timers.push(reset);

          timeouts.set(index, timers);
        };

        replay.addEventListener("click", play);
        play();

        return card;
      };

      const renderAll = () => {
        stage.innerHTML = "";
        timeouts.clear();
        examples.forEach((example, index) => stage.appendChild(buildCard(example, index)));
      };

      renderAll();
      document.getElementById("replay-all")?.addEventListener("click", renderAll);
    </script>
  </body>
</html>
